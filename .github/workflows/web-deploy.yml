name: Web Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web:
    name: Flutter Web Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.6'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze (fatura modülü)
        run: flutter analyze lib/features/fatura lib/core/services/ai_extraction_service.dart --no-fatal-infos

      - name: Build web release
        run: flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 7

  deploy:
    name: Firebase Hosting
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Verify Firebase secret
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_B64 secret tanımlı değil."
            echo "Yerelde: .\\scripts\\setup_firebase_github_secret.ps1"
            exit 1
          fi

      - name: Deploy to Firebase Hosting
        env:
          SA_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
        run: |
          printf '%s' "$SA_B64" | base64 -d > "${RUNNER_TEMP}/firebase-sa.json"
          python3 -c "import json; d=json.load(open('${RUNNER_TEMP}/firebase-sa.json')); assert d.get('type')=='service_account', d"
          export GOOGLE_APPLICATION_CREDENTIALS="${RUNNER_TEMP}/firebase-sa.json"
          npx firebase-tools@15.12.0 deploy --only hosting --project dsys-44b8e --non-interactive
